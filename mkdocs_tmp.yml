site_name: SkillCorner Open Data
site_url: https://SkillCorner.github.io/opendata/

theme:
  name: material
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - content.code.copy
    - content.code.annotate

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - tags
  - mkdocs-jupyter:
      execute: false  # Don't execute notebooks during build, just render them as-is
      include_requirejs: true

# The navigation structure maps the new docs/ folder we created
nav:
  - Home: index.md
  - Tutorials:
    - Overview: tutorials/README.md
    - 'Path 01: Getting Started':
      - Normalization Basics: tutorials/01_Getting_Started_with_SkillCorner_Data/DATA_NORMALIZATION_BASICS.md
      - Viz Tutorial: tutorials/01_Getting_Started_with_SkillCorner_Data/Part1_Visualization_with_SkillCorner_Tutorial.ipynb
      - Z-Scores: tutorials/01_Getting_Started_with_SkillCorner_Data/Part2_Multiple_Metrics_and_Z_Scores_Tutorial.ipynb
    - 'Path 02: Game Intelligence':
      - 'Part 1: Aggregating Events': tutorials/02_Working_with_Game_Intelligence_and_Dynamic_Events/Part1_Aggregating_Dynamic_Events_Tutorial.ipynb
      - 'Part 2: Phases of Play': tutorials/02_Working_with_Game_Intelligence_and_Dynamic_Events/Part2_Data_Aggregating_Phases_of_Play_Tutorial.ipynb
      - 'Part 3: Merging Track/Event': tutorials/02_Working_with_Game_Intelligence_and_Dynamic_Events/Part3_Merging_Dynamic_Events_and_Tracking_Data_Tutorial.ipynb
      - 'Part 4: Off-ball Runs': tutorials/02_Working_with_Game_Intelligence_and_Dynamic_Events/Part4_Offball_Runs_Pitch_visualization.ipynb
      - 'Part 5: Animated Video': tutorials/02_Working_with_Game_Intelligence_and_Dynamic_Events/Part5_Animated_2D_Video_From_Tracking_And_Events.ipynb
      - 'Part 6: Cutback Metrics': tutorials/02_Working_with_Game_Intelligence_and_Dynamic_Events/Part6_BuildYourOwnMetric_Detecting_and_Evaluating_Cutback_Opportunities.ipynb
    - 'Path 03: Basics of Tracking':
      - Tracking Core: tutorials/03_Basics_of_Tracking/Open_Data_Tracking_Tutorial.ipynb
      - Kloppy Integration: tutorials/03_Basics_of_Tracking/Open_Data_Getting_Started_with_Tracking_and_Kloppy_Tutorial.ipynb
    - 'Path 04: Visualizations':
      - Sectioned Summary: tutorials/04_Visualizations/Sectioned_Summary_Table_Viz_Tutorial.ipynb
  - Source Code Setup: src.md
